<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />

    <script>
        const redirectPath =
            window.location.pathname +
            window.location.search +
            window.location.hash;

        sessionStorage.setItem("redirectPath", redirectPath);

        window.location.replace("/");
    </script>
</head>

<body></body>

</html>
