name: CI - Chouga Online

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Chouga-online

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Chouga-online/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar linters
        run: npm run lint

      - name: Build do projeto
        run: npm run build